task:
  action_constraint:
    _target_: core.constraints.SphereConstraint
    var_count: 2
    ub: 0.05
  id: reacher
  state_bounds: null
  state_indexes: null
  var_count: 2
  action_low: -1.0
  action_high: 1.0
  agent:
    gamma: 0.98
  total_timesteps: 300000
  env:
    id: Reacher-v2
agent:
  gamma: 0.99
  policy: MlpPolicy
  policy_kwargs:
    net_arch:
    - 400
    - 300
  batch_size: 100
  learning_rate: 0.001
  buffer_size: 200000
  tau: 0.005
  action_noise: 0.1
  learning_starts: 10000
  train_freq: ${to_tuple:1, "episode"}
  gradient_steps: -1
  _target_: core.rl.DDPGPro
cv_error_margin: 0.1
seed: 4
